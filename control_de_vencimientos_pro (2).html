<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Vencimientos - Jose Stores</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        darkbg: '#0f172a',
                        darkcard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SweetAlert2 para alertas profesionales -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- ZXing para escaneo profesional de códigos de barra -->
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

    <style>
        /* Estilos personalizados y animaciones */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.95); border-color: #334155; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #video-container { position: relative; width: 100%; border-radius: 0.75rem; overflow: hidden; background: #000; }
        #video { width: 100%; height: auto; object-fit: cover; }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #22c55e;
            box-shadow: 0 0 10px #22c55e; top: 50%; left: 0;
            animation: scanAnim 2s infinite linear;
        }
        @keyframes scanAnim {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        /* Ocultar scrollbars para diseño más limpio */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkbg dark:text-slate-200 font-sans min-h-screen">

    <!-- ================= PANTALLA DE LOGIN ================= -->
    <div id="login-view" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-primary to-blue-400 dark:from-darkbg dark:to-slate-800">
        <div class="bg-white dark:bg-darkcard p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in text-center">
            <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                <i class="fa-solid fa-boxes-packing text-4xl text-primary dark:text-blue-400"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-1">Jose Stores</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">Control de Vencimientos POS</p>
            
            <form onsubmit="hacerLogin(event)" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Usuario</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3 top-3 text-slate-400"></i>
                        <input type="text" id="login-user" required class="w-full pl-10 p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none transition" placeholder="admin">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Contraseña</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-3 text-slate-400"></i>
                        <input type="password" id="login-pass" required class="w-full pl-10 p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none transition" placeholder="••••••">
                    </div>
                </div>
                <div class="flex items-center justify-between mb-4">
                    <label class="flex items-center text-sm cursor-pointer">
                        <input type="checkbox" id="login-remember" class="mr-2 rounded border-slate-300 text-primary focus:ring-primary">
                        <span class="dark:text-slate-300">Recordarme</span>
                    </label>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-blue-800 text-white p-3 rounded-lg font-bold transition shadow-lg flex justify-center items-center gap-2">
                    Ingresar <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ================= PANTALLA PRINCIPAL (APP) ================= -->
    <div id="app-view" class="hidden pb-20">
        
        <!-- Encabezado / Navbar -->
        <header class="bg-gradient-to-r from-primary to-secondary text-white sticky top-0 z-40 shadow-lg">
            <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-boxes-packing text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg md:text-xl font-bold leading-tight">CONTROL VENCIMIENTOS</h1>
                        <p class="text-xs text-blue-100 opacity-90"><i class="fa-solid fa-store mr-1"></i>Jose Stores POS</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" class="p-2 hover:bg-white/20 rounded-full transition" title="Modo Oscuro">
                        <i id="dark-icon" class="fa-solid fa-moon text-lg"></i>
                    </button>
                    <button onclick="cerrarSesion()" class="p-2 hover:bg-white/20 rounded-full transition text-red-200 hover:text-red-100" title="Cerrar Sesión">
                        <i class="fa-solid fa-power-off text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 mt-2 space-y-6">
            
            <!-- Dashboard / Estadísticas -->
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">
                <!-- Total -->
                <div class="bg-white dark:bg-darkcard p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col justify-center items-center text-center">
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 dark:bg-blue-900/50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-cubes text-xl"></i>
                    </div>
                    <h3 class="text-3xl font-bold text-slate-800 dark:text-white" id="stat-total">0</h3>
                    <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Registrados</p>
                </div>
                <!-- Vencidos -->
                <div class="bg-white dark:bg-darkcard p-4 rounded-xl shadow-sm border border-red-200 dark:border-red-900/50 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-red-100 dark:text-red-900/20 text-6xl"><i class="fa-solid fa-circle-xmark"></i></div>
                    <h3 class="text-3xl font-bold text-red-600 dark:text-red-500 relative z-10" id="stat-vencidos">0</h3>
                    <p class="text-xs text-slate-600 dark:text-slate-400 uppercase font-semibold relative z-10">Vencidos</p>
                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 mt-2 rounded-full"><div id="bar-vencidos" class="bg-red-500 h-1.5 rounded-full" style="width: 0%"></div></div>
                </div>
                <!-- Por vencer -->
                <div class="bg-white dark:bg-darkcard p-4 rounded-xl shadow-sm border border-yellow-200 dark:border-yellow-900/50 relative overflow-hidden">

                    <h3 class="text-3xl font-bold text-yellow-600 dark:text-yellow-500 relative z-10" id="stat-alerta">0</h3>
                    <p class="text-xs text-slate-600 dark:text-slate-400 uppercase font-semibold relative z-10">Por Vencer (≤15d)</p>
                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 mt-2 rounded-full"><div id="bar-alerta" class="bg-yellow-500 h-1.5 rounded-full" style="width: 0%"></div></div>
                </div>
                <!-- Seguros -->
                <div class="bg-white dark:bg-darkcard p-4 rounded-xl shadow-sm border border-green-200 dark:border-green-900/50 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-green-100 dark:text-green-900/20 text-6xl"><i class="fa-solid fa-shield-check"></i></div>
                    <h3 class="text-3xl font-bold text-green-600 dark:text-green-500 relative z-10" id="stat-seguros">0</h3>
                    <p class="text-xs text-slate-600 dark:text-slate-400 uppercase font-semibold relative z-10">Seguros</p>
                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 mt-2 rounded-full"><div id="bar-seguros" class="bg-green-500 h-1.5 rounded-full" style="width: 0%"></div></div>
                </div>
            </section>

            <!-- Barra de Herramientas -->
            <section class="flex flex-wrap gap-2 justify-between items-center glass-panel p-3 rounded-xl border border-slate-200 shadow-sm sticky top-16 z-30 fade-in">
                <div class="flex-1 min-w-[200px] relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" id="buscador" oninput="renderizarLista()" class="w-full pl-10 p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none transition dark:text-white" placeholder="Buscar producto o código...">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="abrirModalFormulario()" class="flex-1 md:flex-none bg-primary text-white px-4 py-2 rounded-lg shadow hover:bg-blue-800 transition font-medium flex justify-center items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Manual
                    </button>
                    <button onclick="iniciarEscaner()" class="flex-1 md:flex-none bg-emerald-600 text-white px-4 py-2 rounded-lg shadow hover:bg-emerald-700 transition font-medium flex justify-center items-center gap-2">
                        <i class="fa-solid fa-camera"></i> Cámara
                    </button>
                    <!-- Menú Exportar/Importar -->
                    <div class="relative group">
                        <button class="bg-slate-800 dark:bg-slate-600 text-white px-4 py-2 rounded-lg shadow transition font-medium flex justify-center items-center gap-2 h-full">
                            <i class="fa-solid fa-file-export"></i> CSV
                        </button>
                        <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-darkcard border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
                            <button onclick="exportarCSV()" class="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-sm"><i class="fa-solid fa-download mr-2 text-primary"></i> Descargar CSV</button>
                            <label class="w-full text-left px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-sm cursor-pointer block border-t border-slate-100 dark:border-slate-700">
                                <i class="fa-solid fa-upload mr-2 text-emerald-600"></i> Importar CSV
                                <input type="file" accept=".csv" class="hidden" onchange="importarCSV(event)">
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Filtros Rápidos -->
            <div class="flex gap-2 overflow-x-auto pb-2 hide-scroll" id="filtros">
                <button onclick="filtrar('todos')" class="filtro-btn activo bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap shadow-sm">Todos</button>
                <button onclick="filtrar('seguro')" class="filtro-btn bg-white dark:bg-darkcard text-slate-600 dark:text-slate-300 border border-slate-300 dark:border-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap shadow-sm"><i class="fa-solid fa-shield-check text-green-500 mr-1"></i>Seguros</button>
                <button onclick="filtrar('alerta')" class="filtro-btn bg-white dark:bg-darkcard text-slate-600 dark:text-slate-300 border border-slate-300 dark:border-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap shadow-sm"><i class="fa-solid fa-triangle-exclamation text-yellow-500 mr-1"></i>Alerta</button>
                <button onclick="filtrar('vencido')" class="filtro-btn bg-white dark:bg-darkcard text-slate-600 dark:text-slate-300 border border-slate-300 dark:border-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap shadow-sm"><i class="fa-solid fa-circle-xmark text-red-500 mr-1"></i>Vencidos</button>
            </div>

            <!-- Modal / Contenedor del Escáner ZXing -->
            <section id="scanner-section" class="hidden bg-white dark:bg-darkcard p-4 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 fade-in relative">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-bold text-slate-800 dark:text-white flex items-center gap-2">
                        <i class="fa-solid fa-barcode text-primary"></i> Escaneando...
                    </h2>
                    <div class="flex gap-2">
                        <button id="btn-switch-cam" class="hidden bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 p-2 rounded-full transition" title="Cambiar Cámara">
                            <i class="fa-solid fa-camera-rotate text-slate-700 dark:text-white"></i>
                        </button>
                        <button onclick="cerrarEscaner()" class="bg-red-100 hover:bg-red-200 text-red-600 p-2 rounded-full transition">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>
                </div>
                <div id="video-container">
                    <video id="video"></video>
                    <div class="scan-line"></div>
                </div>
                <p class="text-center text-xs text-slate-500 mt-2"><i class="fa-solid fa-circle-info mr-1"></i>Apunta al código de barras o QR. Enfoque automático.</p>
            </section>

            <!-- Lista de Inventario -->
            <section>
                <div id="lista-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Cards inyectadas por JS -->
                </div>
            </section>

        </main>

    <!-- ================= MODAL FORMULARIO (Crear / Editar) ================= -->
    <div id="modal-form" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkcard rounded-2xl shadow-2xl w-full max-w-md overflow-hidden fade-in relative">
            <div class="bg-primary p-4 text-white flex justify-between items-center">
                <h2 id="modal-title" class="font-bold text-lg">Registrar Producto</h2>
                <button onclick="cerrarModalFormulario()" class="text-blue-200 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="formulario-producto" class="p-5 space-y-4" onsubmit="guardarProducto(event)">
                <input type="hidden" id="prod-id">
                <input type="hidden" id="prod-fecha-reg">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Código de Barras <span class="text-red-500">*</span></label>
                    <div class="flex gap-2">
                        <input type="text" id="prod-codigo" required class="w-full p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none dark:text-white font-mono" placeholder="Escanea o escribe...">
                        <button type="button" onclick="iniciarEscaner(true)" class="bg-slate-200 dark:bg-slate-600 px-3 rounded-lg hover:bg-slate-300 transition" title="Usar Cámara">
                            <i class="fa-solid fa-camera dark:text-white"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nombre del Producto / Lote <span class="text-red-500">*</span></label>
                    <input type="text" id="prod-nombre" required class="w-full p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none dark:text-white" placeholder="Ej. Leche Entera 1L">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Fecha de Vencimiento <span class="text-red-500">*</span></label>
                    <input type="date" id="prod-fecha" required class="w-full p-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-700 focus:ring-2 focus:ring-primary outline-none dark:text-white">
                </div>
                
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="cerrarModalFormulario()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-2.5 rounded-lg font-medium hover:bg-slate-200 dark:hover:bg-slate-600 transition">Cancelar</button>
                    <button type="submit" class="flex-1 bg-primary text-white py-2.5 rounded-lg font-bold hover:bg-blue-800 transition shadow-md">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script Principal de la Aplicación -->
    <script>
        // ================= ESTADO Y DATOS =================
        const USER_CORRECTO = 'jose';
        const PASS_CORRECTA = '123';
        const DB_KEY = 'jose_stores_inventario';
        
        let inventario = [];
        let filtroActual = 'todos';
        
        // Variables ZXing Scanner
        let codeReader;
        let selectedDeviceId;
        let videoDevices = [];
        let scanningContext = 'main'; // 'main' o 'form'

        // ================= INICIALIZACIÓN =================
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar sesión
            const sesion = localStorage.getItem('sesion_activa');
            if (sesion === 'true') {
                mostrarApp();
            }

            // Cargar Preferencia Modo Oscuro
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('dark-icon').classList.replace('fa-moon', 'fa-sun');
            }

            // Preparar lector ZXing
            codeReader = new ZXing.BrowserMultiFormatReader();
            
            // Escuchar Escáner USB (Pistola)
            configurarEscanerUSB();
        });

        // ================= LOGIN / SEGURIDAD =================
        function hacerLogin(e) {
            e.preventDefault();
            const user = document.getElementById('login-user').value.toLowerCase();
            const pass = document.getElementById('login-pass').value;
            const recordar = document.getElementById('login-remember').checked;

            if (user === USER_CORRECTO && pass === PASS_CORRECTA) {
                if (recordar) localStorage.setItem('sesion_activa', 'true');
                mostrarApp();
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Bienvenido a Jose Stores', showConfirmButton: false, timer: 2000 });
            } else {
                Swal.fire({ icon: 'error', title: 'Acceso Denegado', text: 'Usuario o contraseña incorrectos', confirmButtonColor: '#1e3a8a' });
            }
        }

        function cerrarSesion() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#1e3a8a',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Sí, salir',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('sesion_activa');
                    document.getElementById('app-view').classList.add('hidden');
                    document.getElementById('login-view').classList.remove('hidden');
                    document.getElementById('login-pass').value = '';
                }
            });
        }

        function mostrarApp() {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            cargarDatos();
        }

        // ================= BASE DE DATOS (LOCALSTORAGE) =================
        function cargarDatos() {
            const data = localStorage.getItem(DB_KEY);
            if (data) {
                try { inventario = JSON.parse(data); } catch(e) { inventario = []; }
            }
            renderizarLista();
        }

        function guardarDatos() {
            localStorage.setItem(DB_KEY, JSON.stringify(inventario));
            renderizarLista();
        }

        // ================= LÓGICA DE NEGOCIO =================
        function calcularEstado(fechaVencimientoStr) {
            const hoy = new Date();
            hoy.setHours(0,0,0,0);
            
            const [año, mes, dia] = fechaVencimientoStr.split('-');
            const fechaVenc = new Date(año, mes - 1, dia);
            fechaVenc.setHours(0,0,0,0);

            const diferenciaMs = fechaVenc.getTime() - hoy.getTime();
            const diasRestantes = Math.ceil(diferenciaMs / (1000 * 60 * 60 * 24));

            if (diasRestantes < 0) {
                return { estado: 'vencido', dias: Math.abs(diasRestantes), colorCard: 'border-red-500 bg-red-50 dark:bg-red-900/10', colorBadge: 'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300', icon: 'fa-circle-xmark', text: 'Vencido' };
            } else if (diasRestantes <= 15) {
                return { estado: 'alerta', dias: diasRestantes, colorCard: 'border-yellow-500 bg-yellow-50 dark:bg-yellow-900/10', colorBadge: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/50 dark:text-yellow-300', icon: 'fa-triangle-exclamation', text: `Vence en ${diasRestantes} d` };
            } else {
                return { estado: 'seguro', dias: diasRestantes, colorCard: 'border-green-500 bg-white dark:bg-darkcard', colorBadge: 'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300', icon: 'fa-shield-check', text: `Seguro (${diasRestantes} d)` };
            }
        }

        // ================= FORMULARIO Y CRUD =================
        function abrirModalFormulario(id = null, codigoInicial = '') {
            document.getElementById('formulario-producto').reset();
            document.getElementById('modal-title').innerText = id ? 'Editar Producto' : 'Registrar Producto';
            
            if (id) {
                const prod = inventario.find(p => p.id === id);
                if (prod) {
                    document.getElementById('prod-id').value = prod.id;
                    document.getElementById('prod-codigo').value = prod.codigo;
                    document.getElementById('prod-nombre').value = prod.nombre;
                    document.getElementById('prod-fecha').value = prod.fecha;
                    document.getElementById('prod-fecha-reg').value = prod.fechaRegistro;
                }
            } else {
                document.getElementById('prod-id').value = '';
                document.getElementById('prod-codigo').value = codigoInicial;
                document.getElementById('prod-fecha-reg').value = new Date().toISOString();
                
                // Si pasamos código, buscar si ya existe para sugerir actualización
                if (codigoInicial) verificarDuplicado(codigoInicial);
            }
            
            document.getElementById('modal-form').classList.remove('hidden');
            if(codigoInicial) document.getElementById('prod-nombre').focus();
            else document.getElementById('prod-codigo').focus();
        }

        function cerrarModalFormulario() {
            scanningContext = 'main'; // Previene el bucle que mantenía abierto el modal
            document.getElementById('modal-form').classList.add('hidden');
            cerrarEscaner(); // Por si la cámara estaba abierta
        }

        function verificarDuplicado(codigo) {
            const existe = inventario.find(p => p.codigo === codigo);
            if (existe) {
                Swal.fire({
                    title: 'Producto ya existe',
                    text: `El código ${codigo} corresponde a "${existe.nombre}". ¿Desea actualizar su fecha de vencimiento?`,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Sí, actualizar',
                    cancelButtonText: 'No, cancelar',
                    confirmButtonColor: '#3b82f6'
                }).then((result) => {
                    if (result.isConfirmed) {
                        abrirModalFormulario(existe.id);
                    } else {
                        cerrarModalFormulario();
                    }
                });
                return true;
            }
            return false;
        }

        function guardarProducto(e) {
            e.preventDefault();
            const id = document.getElementById('prod-id').value || Date.now().toString();
            const codigo = document.getElementById('prod-codigo').value;
            const nombre = document.getElementById('prod-nombre').value;
            const fecha = document.getElementById('prod-fecha').value;
            const fechaRegistro = document.getElementById('prod-fecha-reg').value;

            // Revisar si estamos editando o creando
            const index = inventario.findIndex(p => p.id === id);
            
            // Si es nuevo pero el código ya existe y no saltó la alerta antes
            if (index === -1 && inventario.some(p => p.codigo === codigo)) {
                if(!confirm('Este código ya está registrado en otro producto. ¿Guardar de todos modos?')) return;
            }

            const producto = { id, codigo, nombre, fecha, fechaRegistro };

            if (index >= 0) {
                inventario[index] = producto; // Actualizar
            } else {
                inventario.unshift(producto); // Nuevo (al inicio)
            }

            guardarDatos();
            cerrarModalFormulario();
            reproducirSonidoExito();
            
            Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'Guardado correctamente', showConfirmButton: false, timer: 2000 });
        }

        function eliminarProducto(id) {
            Swal.fire({
                title: '¿Eliminar producto?',
                text: "No podrás revertir esta acción.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    inventario = inventario.filter(p => p.id !== id);
                    guardarDatos();
                    Swal.fire({ toast: true, position: 'bottom-end', icon: 'success', title: 'Eliminado', showConfirmButton: false, timer: 1500 });
                }
            });
        }

        // ================= RENDERIZADO E INTERFAZ =================
        function filtrar(tipo) {
            filtroActual = tipo;
            // Estilos de botones
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'dark:bg-slate-200', 'text-white', 'dark:text-slate-800');
                btn.classList.add('bg-white', 'dark:bg-darkcard', 'text-slate-600', 'dark:text-slate-300');
            });
            event.currentTarget.classList.remove('bg-white', 'dark:bg-darkcard', 'text-slate-600', 'dark:text-slate-300');
            event.currentTarget.classList.add('bg-slate-800', 'dark:bg-slate-200', 'text-white', 'dark:text-slate-800');
            renderizarLista();
        }

        function formatearFechaHora(isoString) {
            const d = new Date(isoString);
            return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }

        function renderizarLista() {
            const contenedor = document.getElementById('lista-productos');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            contenedor.innerHTML = '';

            let stats = { total: 0, vencidos: 0, alerta: 0, seguros: 0 };

            // Procesar estados y filtrar
            let datosMostrar = inventario.map(prod => {
                const infoEstado = calcularEstado(prod.fecha);
                stats.total++;
                stats[infoEstado.estado]++;
                return { ...prod, infoEstado };
            });

            // Actualizar Dashboard
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-vencidos').innerText = stats.vencidos;
            document.getElementById('stat-alerta').innerText = stats.alerta;
            document.getElementById('stat-seguros').innerText = stats.seguros;

            // Actualizar barras porcentuales
            if(stats.total > 0){
                document.getElementById('bar-vencidos').style.width = `${(stats.vencidos / stats.total) * 100}%`;
                document.getElementById('bar-alerta').style.width = `${(stats.alerta / stats.total) * 100}%`;
                document.getElementById('bar-seguros').style.width = `${(stats.seguros / stats.total) * 100}%`;
            } else {
                ['bar-vencidos', 'bar-alerta', 'bar-seguros'].forEach(id => document.getElementById(id).style.width = '0%');
            }

            // Aplicar Filtro Botones
            if (filtroActual !== 'todos') {
                datosMostrar = datosMostrar.filter(p => p.infoEstado.estado === filtroActual);
            }

            // Aplicar Búsqueda
            if (busqueda) {
                datosMostrar = datosMostrar.filter(p => p.nombre.toLowerCase().includes(busqueda) || p.codigo.includes(busqueda));
            }

            if (datosMostrar.length === 0) {
                contenedor.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-500 dark:text-slate-400">
                        <i class="fa-solid fa-box-open text-4xl mb-3 opacity-50"></i>
                        <p>No se encontraron productos.</p>
                    </div>`;
                return;
            }

            // Renderizar Cards
            datosMostrar.forEach(prod => {
                const est = prod.infoEstado;
                const tarjeta = document.createElement('div');
                tarjeta.className = `p-4 rounded-xl border-l-4 shadow-sm bg-white dark:bg-darkcard relative flex flex-col justify-between ${est.colorCard} transition-transform hover:-translate-y-1 hover:shadow-md`;
                
                tarjeta.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="${est.colorBadge} text-xs font-bold px-2 py-1 rounded-md flex items-center gap-1">
                                <i class="fa-solid ${est.icon}"></i> ${est.text}
                            </span>
                            <div class="flex gap-2">
                                <button onclick="abrirModalFormulario('${prod.id}')" class="text-slate-400 hover:text-blue-500 transition" title="Editar"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="eliminarProducto('${prod.id}')" class="text-slate-400 hover:text-red-500 transition" title="Eliminar"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                        <h3 class="font-bold text-lg text-slate-800 dark:text-white leading-tight mb-1">${prod.nombre}</h3>
                        <p class="text-sm font-mono text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 inline-block px-2 py-0.5 rounded"><i class="fa-solid fa-barcode mr-1"></i>${prod.codigo}</p>
                    </div>
                    
                    <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-700 flex justify-between items-end">
                        <div>
                            <p class="text-xs text-slate-400 mb-0.5">Vencimiento</p>
                            <p class="font-semibold text-slate-700 dark:text-slate-300">${prod.fecha.split('-').reverse().join('/')}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400" title="Fecha de Registro"><i class="fa-regular fa-clock"></i> ${formatearFechaHora(prod.fechaRegistro)}</p>
                        </div>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // ================= MODO OSCURO =================
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('dark-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // ================= ESCÁNER DE CÁMARA (ZXING) =================
        async function iniciarEscaner(desdeFormulario = false) {
            scanningContext = desdeFormulario ? 'form' : 'main';
            if(desdeFormulario) {
                document.getElementById('modal-form').classList.add('hidden'); // Ocultar form temporalmente
            }
            
            document.getElementById('scanner-section').classList.remove('hidden');
            
            try {
                // FORZAR PETICIÓN DE PERMISOS AL NAVEGADOR PRIMERO
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                // Detenemos el stream temporal porque ZXing lo administrará a su manera
                stream.getTracks().forEach(track => track.stop());

                const videoInputDevices = await codeReader.getVideoInputDevices();
                videoDevices = videoInputDevices;
                
                if (videoDevices.length > 0) {
                    if (videoDevices.length > 1) {
                        document.getElementById('btn-switch-cam').classList.remove('hidden');
                        document.getElementById('btn-switch-cam').onclick = cambiarCamara;
                    }
                    
                    // Intentar seleccionar la cámara trasera por defecto si existe
                    const camaraTrasera = videoDevices.find(device => device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('trasera'));
                    selectedDeviceId = camaraTrasera ? camaraTrasera.deviceId : videoDevices[0].deviceId;
                    
                    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                        if (result) {
                            procesarCodigoEscaneado(result.text);
                        }
                    });
                } else {
                    throw new Error("No se encontraron cámaras conectadas");
                }
            } catch (err) {
                console.error("Error de cámara:", err);
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Permiso Denegado', 
                    text: 'Debes permitir el acceso a la cámara en tu navegador para usar el escáner.' 
                });
                cerrarEscaner();
            }
        }

        function cambiarCamara() {
            if (videoDevices.length > 1) {
                let currentIndex = videoDevices.findIndex(d => d.deviceId === selectedDeviceId);
                let nextIndex = (currentIndex + 1) % videoDevices.length;
                selectedDeviceId = videoDevices[nextIndex].deviceId;
                
                codeReader.reset();
                codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                    if (result) procesarCodigoEscaneado(result.text);
                });
            }
        }

        function cerrarEscaner() {
            codeReader.reset();
            document.getElementById('scanner-section').classList.add('hidden');
            if (scanningContext === 'form') {
                document.getElementById('modal-form').classList.remove('hidden');
            }
        }

        function procesarCodigoEscaneado(codigo) {
            reproducirSonidoVibracion();
            cerrarEscaner();
            
            if (scanningContext === 'form') {
                document.getElementById('modal-form').classList.remove('hidden');
                document.getElementById('prod-codigo').value = codigo;
            } else {
                if (!verificarDuplicado(codigo)) {
                    abrirModalFormulario(null, codigo);
                }
            }
        }

        // ================= ESCÁNER USB =================
        function configurarEscanerUSB() {
            let buffer = '';
            let timeout;

            document.addEventListener('keypress', (e) => {
                // Si el foco está en un input text, no interferir
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    if(e.key === 'Enter') e.preventDefault(); // Evitar submit accidental
                    return; 
                }

                if (e.key === 'Enter') {
                    if (buffer.length > 3) { // Código mínimo
                        procesarCodigoEscaneado(buffer);
                    }
                    buffer = '';
                } else {
                    buffer += e.key;
                    clearTimeout(timeout);
                    // Los escáneres USB envían teclas muy rápido. Si pasan 50ms, limpiar (tecleo humano)
                    timeout = setTimeout(() => { buffer = ''; }, 50);
                }
            });
        }

        // ================= HARDWARE (BEEP & VIBRACIÓN) =================
        function reproducirSonidoVibracion() {
            // Vibrar si está disponible
            if (navigator.vibrate) navigator.vibrate(200);
            reproducirSonidoExito();
        }

        function reproducirSonidoExito() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                // Sonido tipo caja registradora (Onda cuadrada aguda)
                osc.type = 'square';
                osc.frequency.setValueAtTime(1500, ctx.currentTime); 
                
                // Volumen
                gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                // Corte abrupto para simular el "beep" corto
                gainNode.gain.setValueAtTime(0, ctx.currentTime + 0.15);
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) {
                console.error("No se pudo reproducir el sonido", e);
            }
        }

        // ================= EXPORTAR / IMPORTAR CSV =================
        function exportarCSV() {
            if (inventario.length === 0) return Swal.fire({icon: 'info', title: 'Vacío', text: 'No hay productos para exportar.'});
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID,Codigo,Nombre,Fecha Vencimiento,Fecha Registro\n";
            
            inventario.forEach(p => {
                let row = `${p.id},${p.codigo},"${p.nombre}",${p.fecha},${p.fechaRegistro}`;
                csvContent += row + "\n";
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Inventario_JoseStores_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        function importarCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n');
                let agregados = 0;

                // Empezar desde 1 para saltar cabeceras
                for(let i = 1; i < rows.length; i++) {
                    if(!rows[i].trim()) continue;
                    
                    // Regex para separar por comas ignorando las comas dentro de comillas
                    const cols = rows[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if(cols && cols.length >= 4) {
                        const codigo = cols[1].replace(/"/g, '');
                        const nombre = cols[2].replace(/"/g, '');
                        const fecha = cols[3].replace(/"/g, '');
                        
                        // Solo agregar si no existe el código (simple)
                        if(!inventario.some(p => p.codigo === codigo)) {
                            inventario.push({
                                id: Date.now().toString() + i,
                                codigo: codigo,
                                nombre: nombre,
                                fecha: fecha,
                                fechaRegistro: new Date().toISOString()
                            });
                            agregados++;
                        }
                    }
                }
                
                if (agregados > 0) {
                    guardarDatos();
                    Swal.fire({icon: 'success', title: 'Importación Exitosa', text: `Se agregaron ${agregados} productos nuevos.`});
                } else {
                    Swal.fire({icon: 'info', title: 'Sin cambios', text: 'No se encontraron productos nuevos para agregar (es posible que ya existan o el formato sea incorrecto).'});
                }
                event.target.value = ''; // Reset input
            };
            reader.readAsText(file);
        }

    </script>
